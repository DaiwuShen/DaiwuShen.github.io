{{ define "title" }}{{ .Title }} | {{ .Site.Title }}{{ end }}

{{ define "main" }}
<div class="data-block">
    <div class="block-title">
        <div class="block-title-name">
            <span>🏷️ 标签：{{ .Title }}</span>
            <span style="font-size: 14px; color: #808080;">共 {{ len .Pages }} 篇文章</span>
        </div>
    </div>
    <div style="padding: 16px;">
        {{ range .Pages }}
        <div style="padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
            <a href="{{ .RelPermalink }}" style="color: #333;">{{ .Title }}</a>
            <span style="color: #808080; font-size: 13px;">{{ .Date.Format "2006-01-02" }}</span>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
