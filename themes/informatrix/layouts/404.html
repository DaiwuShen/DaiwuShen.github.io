{{ define "title" }}404 Not Found! | {{ .Site.Title }}{{ end }}

{{ define "main" }}
<div class="data-block" style="text-align: center; padding: 80px 20px;">
    <div style="font-size: 120px; color: #1d8fed; margin-bottom: 20px;">404</div>
    <h1 style="color: #333; margin-bottom: 10px;">页面不存在</h1>
    <p style="color: #808080; font-size: 16px; margin-bottom: 30px;">你访问的页面可能已被移除或地址输入有误</p>
    <a href="{{ "/" | relURL }}" style="display: inline-block; padding: 10px 30px; background: #1d8fed; color: white; border-radius: 6px; text-decoration: none;">返回首页</a>
</div>
{{ end }}
